		<div class="container">

			<div class="row">
				<div class="col">
					<h1>Make reservation</h1>

                    <form action="" method="post" class="needs-validation" novalidate>

                        <div class="form-group mt-3">
                            <label for="first_name">First name:</label>
                            <input type="text" id="first_name" class="form-control" name="first_name" required autocomplete="off">
                        </div>

                        <div class="form-group mt-3">
                            <label for="last_name">Last name:</label>
                            <input type="text" id="last_name" class="form-control" name="last_name" required autocomplete="off">
                        </div>

                        <div class="form-group mt-3">
                            <label for="email">Email:</label>
                            <input type="email" id="email" class="form-control" name="email" required autocomplete="off">
                        </div>

                        <div class="form-group mt-3">
                            <label for="phone">Phone:</label>
                            <input type="tel" id="phone" class="form-control" name="phone" required autocomplete="off">
                        </div>

                        <button type="submit" class="btn btn-primary mt-3">Make Reservation</button>

                    </form>
				</div>
