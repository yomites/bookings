				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>

		<div class="container">

			<div class="row">
                <div class="col-md-3"></div>
				<div class="col-md-6">
					<h1 class="mt-5">Search for Availability</h1>

                    <form action="reservation.html" method="get" novalidate class="needs-validation">

                        <div class="row">
                        
                            <div class="col">
                                <div class="form-group">
                                    <label for="start-date">Starting Date</label>
                                    <input required type="date" class="form-control" id="start-date" name="start-date" aria-describedby="startDateHelp">
                                    <small id="startDateHelp" class="form-text text-muted">Select your starting date</small>
                                </div>
                            </div>

                            <div class="col">
                                <div class="form-group">
                                    <label for="end-date">Ending Date</label>
                                    <input required type="date" class="form-control" id="end-date" name="end-date" aria-describedby="endDateHelp">
                                    <small id="endDateHelp" class="form-text text-muted">Select your ending date</small>
                                </div>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-primary">Search Availability</button>

                    </form>
				</div>
			</div>

			<div class="row">
				<div class="col">
					<p id="myParagraph">This is some text.</p>
					<p>
						<button id="colorButton" class="btn btn-outline-secondary">Click me
						</button>
					</p>
				</div>
			</div>
		</div>

		<div class="row my-footer">
			<div class="col">
				Left
			</div>
			<div class="col">
				Middle
			</div>
			<div class="col">
				Right
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

		<script>
			console.log("Hello from the reservation page!");

			// Example starter JavaScript for disabling form submissions if there are invalid fields
			(() => {
			'use strict'

			// Fetch all the forms we want to apply custom Bootstrap validation styles to
			const forms = document.querySelectorAll('.needs-validation')

			// Loop over them and prevent submission
			Array.from(forms).forEach(form => {
				form.addEventListener('submit', event => {
				if (!form.checkValidity()) {
					event.preventDefault()
					event.stopPropagation()
				}

				form.classList.add('was-validated')
				}, false)
			})
			})()

			document.getElementById("colorButton").addEventListener("click", function() {

				let myEl = document.getElementById("myParagraph");

				if (myEl.classList.contains("redText")) {
					myEl.classList.remove("redText");
				} else {
					myEl.classList.add("redText");
				}
				myEl.classList.toggle("redText");
			});
		</script>
	</body>
